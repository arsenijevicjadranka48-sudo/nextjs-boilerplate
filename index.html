<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Glasovni Izvještaji</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        button { padding: 15px 25px; font-size: 1rem; cursor: pointer; border: none; border-radius: 50px; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-mic { background-color: #007bff; color: white; }
        .btn-mic.recording { background-color: #dc3545; animation: pulse 1.5s infinite; }
        .btn-send { background-color: #28a745; color: white; display: none; }
        #status { margin: 15px 0; color: #555; font-style: italic; }
        #output { border: 1px solid #ddd; padding: 10px; min-height: 50px; border-radius: 8px; background: #fafafa; margin-bottom: 10px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Diktiraj Izvještaj</h2>
    <div id="output">Klikni na mikrofon i pričaj...</div>
    <div id="status">Spreman</div>
    
    <button id="micBtn" class="btn-mic">🎤 Pokreni Mikrofon</button>
    <button id="sendBtn" class="btn-send">🚀 Pošalji u Bazu</button>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const sendBtn = document.getElementById('sendBtn');
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    let recognition;
    let finalTranscript = '';

    // Provjera podrške za browser
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'bs-BA'; // Postavljeno na bosanski

        recognition.onstart = () => {
            micBtn.classList.add('recording');
            micBtn.innerText = '🛑 Slušam...';
            status.innerText = 'Snimanje u toku...';
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            output.innerText = finalTranscript || interimTranscript;
            if(finalTranscript) sendBtn.style.display = 'block';
        };

        recognition.onend = () => {
            micBtn.classList.remove('recording');
            micBtn.innerText = '🎤 Pokreni Mikrofon';
            status.innerText = 'Snimanje završeno.';
        };
    } else {
        alert("Vaš browser ne podržava prepoznavanje glasa. Molimo koristite Chrome.");
    }

    micBtn.onclick = () => {
        finalTranscript = '';
        output.innerText = '';
        recognition.start();
    };

    sendBtn.onclick = async () => {
        status.innerText = 'Slanje u Supabase...';
        sendBtn.disabled = true;

        try {
            const response = await fetch('https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/obradi-izvjestaj', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tekst_za_obradu: finalTranscript })
            });

            if (response.ok) {
                status.innerText = '✅ Uspješno upisano u bazu!';
                finalTranscript = '';
                setTimeout(() => { sendBtn.style.display = 'none'; }, 2000);
            } else {
                status.innerText = '❌ Greška pri slanju.';
            }
        } catch (err) {
            status.innerText = '❌ Greška: ' + err.message;
        } finally {
            sendBtn.disabled = false;
        }
    };
</script>

    <script>
  // Provjeravamo da li browser podržava prepoznavanje glasa
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  
  if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = 'bs-BA'; // Postavljeno na bosanski
    recognition.continuous = false;
    recognition.interimResults = false;

    const btn = document.querySelector('button'); // Tvoje dugme
    const statusText = document.querySelector('p'); // Tekst "Spreman"
    const textBox = document.querySelector('.text-box-klasa'); // Promijeni u klasu tvog polja

    btn.addEventListener('click', () => {
      recognition.start();
      statusText.innerText = "Slušam...";
    });

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      // Ovdje upisujemo ono što si rekao u box
      document.getElementById('tvoj-id-tekst-boxa').value = transcript; 
      statusText.innerText = "Završeno.";
    };

    recognition.onerror = (event) => {
      statusText.innerText = "Greška: " + event.error;
    };
  } else {
    alert("Vaš browser ne podržava prepoznavanje glasa. Probajte Google Chrome.");
  }
</script>
    
</body>
</html>
