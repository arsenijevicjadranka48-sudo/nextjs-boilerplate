<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nadzor Alarma</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        textarea { width: 100%; min-height: 100px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; padding: 10px; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-mic { background-color: #007bff; color: white; }
        .btn-send { background-color: #28a745; color: white; }
        .btn-refresh { background-color: #17a2b8; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #eee; }
        .alarm-aktivni { background-color: #ffcccc; color: #cc0000; font-weight: bold; animation: treperi 1s infinite; }
        @keyframes treperi { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>🎤 Novi Izvještaj / Alarm</h2>
    <textarea id="output" placeholder="Izdiktiraj kvar ili sastanak..."></textarea>
    <button id="micBtn" class="btn-mic">🎤 Pokreni Mikrofon</button>
    <button id="sendBtn" class="btn-send">🚀 Pošalji u Bazu</button>

    <hr>
    
    <h2>🔔 Aktivni Alarmi (24h)</h2>
    <button id="refreshBtn" class="btn-refresh">🔄 Osvježi listu</button>
    <div id="listaIzvjestaja">Učitavam podatke...</div>
</div>

<audio id="sirena" src="https://actions.google.com/sounds/v1/alarms/alarm_clock_short_beeps.ogg" preload="auto"></audio>

<script>
    // --- KONFIGURACIJA (OVDJE STAVI SVOJE KLJUČEVE) ---
    const SUPABASE_URL = 'https://mpgbpgmsorunfbdskbwn.supabase.co';
    const ANON_KEY = 'sb_publishable_PIRKTE7AzJKSBwLjPB04yg_laTBEEb6'; // Pronađi u Supabase Settings > API
    const FUNCTION_URL = 'https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/obradi-izvjestaj';

    const output = document.getElementById('output');
    const micBtn = document.getElementById('micBtn');
    const sendBtn = document.getElementById('sendBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const lista = document.getElementById('listaIzvjestaja');
    const sirena = document.getElementById('sirena');

    // 1. FUNKCIJA ZA POVLAČENJE PODATAKA I ALARM
   async function povuciPodatke() {
    lista.innerHTML = 'Učitavam cijelu bazu podataka...';
    try {
        // Povlačimo sve zapise, poredane po datumu (najnoviji na vrhu)
        const res = await fetch(`${SUPABASE_URL}/rest/v1/IZVJESTAJI_NH?select=*&order=DATUM.desc`, {
            headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
        });
        const podaci = await res.json();
        
        const sad = new Date();
        const sutraUovoVrijeme = new Date(sad.getTime() + (24 * 60 * 60 * 1000));
        let imaHitnihAlarma = false;

        let html = '<table border="1" style="width:100%; border-collapse: collapse;">';
        html += '<tr style="background:#eee;"><th>Datum</th><th>Razlog / Zadatak</th></tr>';
        
        podaci.forEach(red => {
            const datumAlarma = new Date(red.DATUM);
            
            // PROVJERA: Da li je alarm u budućnosti, ali u okviru narednih 24 sata?
            const jeUNarednih24h = datumAlarma >= sad && datumAlarma <= sutraUovoVrijeme;
            
            let stil = '';
            if (jeUNarednih24h) {
                // Ako je u naredna 24h, red postaje crven i treperi
                stil = 'class="alarm-aktivni"';
                imaHitnihAlarma = true;
            }

            html += `<tr ${stil}>
                <td style="padding:8px;">${datumAlarma.toLocaleString('bs-BA')}</td>
                <td style="padding:8px;">${red.RAZLOG}</td>
            </tr>`;
        });
        
        html += '</table>';
        lista.innerHTML = html;

        // Sirena se pali samo ako ima nešto što tek treba da dođe u narednih 24 sata
        if (imaHitnihAlarma) {
            sirena.play().catch(e => console.log("Klikni na stranicu da aktiviraš zvuk sirene!"));
            console.log("ALARM: Postoje zadaci u narednih 24h!");
        }

    } catch (err) {
        lista.innerHTML = 'Greška pri povlačenju: ' + err.message;
    }
}

    // 2. MIKROFON LOGIKA
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'bs-BA';
        recognition.onresult = (e) => { output.value = e.results[0][0].transcript; };
    }

    micBtn.onclick = () => { recognition.start(); };

    // 3. SLANJE U BAZU
    sendBtn.onclick = async () => {
        sendBtn.disabled = true;
        sendBtn.innerText = 'Slanje...';
        await fetch(FUNCTION_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tekst_za_obradu: output.value })
        });
        output.value = '';
        sendBtn.disabled = false;
        sendBtn.innerText = '🚀 Pošalji u Bazu';
        povuciPodatke(); // Automatski osvježi listu nakon slanja
    };

    refreshBtn.onclick = povuciPodatke;
    
    // Pokreni odmah pri učitavanju
    window.onload = povuciPodatke;
    // Provjeravaj svakih 5 minuta automatski
    setInterval(povuciPodatke, 300000);
</script>

</body>
</html>
